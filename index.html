<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="" width="" initial-scale="1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form class="search-form">
          <input
            type="search"
            placeholder="Enter a city..."
            required
            class="search-form-input"
          />
          <input type="submit" value="Search" class="search-form-button" />
        </form>
      </header>
      <main>
        <div>
          <h1>Toronto</h1>
          <p>
            Sunday 18:20, mostly sunny
            <br />
            Humidity: 46%, Wind: 12km/h
          </p>
        </div>
        <div>☀️ 27°C</div>
      </main>
      <footer>
        This project was coded by
        <a href="https://github.com/cpeterdy" target="_blank">Chelsea Peterdy</a
        >, is open sourced on
        <a
          href="https://github.com/cpeterdy/weather-app-project"
          target="_blank"
          >Github</a
        >
        and is hosted on
        <a
          href="https://weather-app-project-peterdy.netlify.app/"
          target="_blank"
          >Netlify</a
        >
      </footer>
    </div>
  </body>
</html>
