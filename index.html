<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="" width="" initial-scale="1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form class="search-form" id="search-form">
          <input
            type="search"
            placeholder="Enter a city..."
            required
            class="search-form-input"
            id="search-form-input"
          />
          <input type="submit" value="Search" class="search-form-button" />
        </form>
      </header>
      <main>
        <div class="weather-app-data">
          <div>
            <h1 class="weather-app-city" id="weather-app-city">Toronto</h1>
            <p class="weather-app-details">
              Sunday 18:20, mostly sunny
              <br />
              Humidity: <strong>68%</strong>, Wind: <strong>12km/h</strong>
            </p>
          </div>
          <div class="current-temperature-container">
            <div class="current-temperature-icon">☀️</div>
            <div class="current-temperature-value">27</div>
            <div class="current-temperature-unit">°C</div>
          </div>
        </div>
      </main>
      <footer>
        This project was coded by
        <a href="https://github.com/cpeterdy" target="_blank">Chelsea Peterdy</a
        >, is open sourced on
        <a
          href="https://github.com/cpeterdy/weather-app-project"
          target="_blank"
          >Github</a
        >
        and is hosted on
        <a
          href="https://weather-app-project-peterdy.netlify.app/"
          target="_blank"
          >Netlify</a
        >
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
